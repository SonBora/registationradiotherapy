<!DOCTYPE html>
<html>
<head>
<title>Radiotherapy Unit – Loung Mè Hospital</title>
<style>
body{font-family:Arial;background:#eef3ff;text-align:center;}
.box{background:white;width:1000px;margin:auto;padding:20px;border-radius:10px;box-shadow:0 0 10px gray;}
input,select{padding:6px;margin:3px;width:95%;}
button{padding:10px 20px;background:#2b6cff;color:white;border:none;margin:5px;cursor:pointer;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
td,th{border:1px solid gray;padding:6px;}
.hidden{display:none;}
</style>
</head>
<body>

<div class="box">
<h2>Radiotherapy Unit – Loung Mè Hospital</h2>

<div id="loginDiv">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<div id="dashboard" class="hidden">
<h3>Dashboard</h3>
<button onclick="showPage('registerPage')">Register Patient</button>
<button onclick="showPage('consultPage')">Booking Consult</button>
<button onclick="showPage('ctsimPage')">Booking CT-Sim</button>
<button onclick="showPage('treatPage')">Booking Treatment</button>
<button onclick="logout()">Logout</button>
</div>

<div id="registerPage" class="hidden">
<h3>Register Patient</h3>
<input id="pName" placeholder="Patient Name">
<input id="pID" placeholder="Patient ID">
<input id="pPhone" placeholder="Phone">
<input id="pDOB" type="date">
<input id="pAddress" placeholder="Address">
<h4>Consultation</h4>
<input id="consultDate" type="date">
<select id="consultStatus"><option>In Progress</option><option>Complete</option></select>
<h4>CT Simulation</h4>
<input id="ctsimDate" type="date">
<select id="ctsimStatus"><option>In Progress</option><option>Complete</option></select>
<h4>Treatment</h4>
<input id="treatDate" type="date">
<select id="treatStatus"><option>In Progress</option><option>Complete</option></select>
<br>
<button onclick="savePatient()">Save Patient</button>
<button onclick="showDashboard()">Back</button>
</div>

<div id="consultPage" class="hidden">
<h3>Booking Consult</h3>
<input id="searchConsult" placeholder="Search..." onkeyup="filterTable('consultTable','searchConsult')">
<table id="consultTable"></table>
<button onclick="showDashboard()">Back</button>
</div>

<div id="ctsimPage" class="hidden">
<h3>Booking CT-Sim</h3>
<input id="searchCT" placeholder="Search..." onkeyup="filterTable('ctsimTable','searchCT')">
<table id="ctsimTable"></table>
<button onclick="showDashboard()">Back</button>
</div>

<div id="treatPage" class="hidden">
<h3>Booking Treatment</h3>
<input id="searchTreat" placeholder="Search..." onkeyup="filterTable('treatTable','searchTreat')">
<table id="treatTable"></table>
<button onclick="showDashboard()">Back</button>
</div>

</div>

<script>
let patients = JSON.parse(localStorage.getItem("patients")) || [];

function saveData(){ 
    localStorage.setItem("patients",JSON.stringify(patients)); 
}

function login(){
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if ((u=="physic" && p=="physic123") ||
      (u=="doctor" && p=="doctor123") ||
      (u=="rtt" && p=="rtt123")){
    document.getElementById("loginDiv").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
  } else {
    document.getElementById("loginMsg").innerText="Wrong login";
  }
}

function logout(){ 
    document.getElementById("dashboard").classList.add("hidden"); 
    document.getElementById("loginDiv").classList.remove("hidden"); 
}

function showDashboard(){
  document.getElementById("registerPage").classList.add("hidden");
  document.getElementById("consultPage").classList.add("hidden");
  document.getElementById("ctsimPage").classList.add("hidden");
  document.getElementById("treatPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

function showPage(id){
  showDashboard();
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
  if(id=="consultPage") populateTable("consultTable","consult");
  if(id=="ctsimPage") populateTable("ctsimTable","ctsim");
  if(id=="treatPage") populateTable("treatTable","treat");
}

function savePatient(){
  let p = {
    name: document.getElementById("pName").value,
    id: document.getElementById("pID").value,
    phone: document.getElementById("pPhone").value,
    dob: document.getElementById("pDOB").value,
    address: document.getElementById("pAddress").value,
    consultDate: document.getElementById("consultDate").value,
    consultStatus: document.getElementById("consultStatus").value,
    ctsimDate: document.getElementById("ctsimDate").value,
    ctsimStatus: document.getElementById("ctsimStatus").value,
    treatDate: document.getElementById("treatDate").value,
    treatStatus: document.getElementById("treatStatus").value
  };
  patients.push(p);
  saveData();
  alert("Patient saved");
  showDashboard();
}

function daysFromToday(dateStr){
  if(!dateStr) return "";
  let today = new Date();
  let date = new Date(dateStr);
  let diff = Math.ceil((date-today)/(1000*60*60*24));
  if(diff>0) return diff+" days left";
  if(diff==0) return "Today";
  return Math.abs(diff)+" days passed";
}

function sortPatients(type){
  patients.sort((a,b)=>{
    let d1,d2;
    if(type=="consult"){d1=new Date(a.consultDate||"2100-01-01"); d2=new Date(b.consultDate||"2100-01-01");}
    if(type=="ctsim"){d1=new Date(a.ctsimDate||"2100-01-01"); d2=new Date(b.ctsimDate||"2100-01-01");}
    if(type=="treat"){d1=new Date(a.treatDate||"2100-01-01"); d2=new Date(b.treatDate||"2100-01-01");}
    return d1-d2;
  });
}

function populateTable(id,type){
  sortPatients(type);
  let table = document.getElementById(id);
  table.innerHTML = "<tr><th>Name</th><th>ID</th><th>Phone</th><th>DOB</th><th>Address</th><th>Date</th><th>Status</th><th>Days</th><th>Actions</th></tr>";
  patients.forEach((p,i)=>{
    let r = table.insertRow();
    r.insertCell(0).innerText=p.name;
    r.insertCell(1).innerText=p.id;
    r.insertCell(2).innerText=p.phone;
    r.insertCell(3).innerText=p.dob;
    r.insertCell(4).innerText=p.address;
    if(type=="consult"){ r.insertCell(5).innerText=p.consultDate; r.insertCell(6).innerText=p.consultStatus; r.insertCell(7).innerText=daysFromToday(p.consultDate); }
    if(type=="ctsim"){ r.insertCell(5).innerText=p.ctsimDate; r.insertCell(6).innerText=p.ctsimStatus; r.insertCell(7).innerText=daysFromToday(p.ctsimDate); }
    if(type=="treat"){ r.insertCell(5).innerText=p.treatDate; r.insertCell(6).innerText=p.treatStatus; r.insertCell(7).innerText=daysFromToday(p.treatDate); }
    r.insertCell(8).innerHTML = `<button onclick="editRow('${id}','${type}',${i})">Edit</button>
      <button onclick="deleteRow('${id}','${type}',${i})" style="background:red;">Delete</button>`;
  });
}

function editRow(tableID,type,index){
  let table=document.getElementById(tableID);
  let row=table.rows[index+1];
  let p=patients[index];
  row.cells[0].innerHTML=`<input value="${p.name}">`;
  row.cells[1].innerHTML=`<input value="${p.id}">`;
  row.cells[2].innerHTML=`<input value="${p.phone}">`;
  row.cells[3].innerHTML=`<input type="date" value="${p.dob}">`;
  row.cells[4].innerHTML=`<input value="${p.address}">`;
  if(type=="consult"){ row.cells[5].innerHTML=`<input type="date" value="${p.consultDate}">`; row.cells[6].innerHTML=`<select><option ${p.consultStatus=="In Progress"?"selected":""}>In Progress</option><option ${p.consultStatus=="Complete"?"selected":""}>Complete</option></select>`;}
  if(type=="ctsim"){ row.cells[5].innerHTML=`<input type="date" value="${p.ctsimDate}">`; row.cells[6].innerHTML=`<select><option ${p.ctsimStatus=="In Progress"?"selected":""}>In Progress</option><option ${p.ctsimStatus=="Complete"?"selected":""}>Complete</option></select>`;}
  if(type=="treat"){ row.cells[5].innerHTML=`<input type="date" value="${p.treatDate}">`; row.cells[6].innerHTML=`<select><option ${p.treatStatus=="In Progress"?"selected":""}>In Progress</option><option ${p.treatStatus=="Complete"?"selected":""}>Complete</option></select>`;}
  row.cells[8].innerHTML=`<button onclick="saveRow('${tableID}','${type}',${index})">Save</button>
    <button onclick="deleteRow('${tableID}','${type}',${index})" style="background:red;">Delete</button>`;
}

function saveRow(tableID,type,index){
  let row=document.getElementById(tableID).rows[index+1];
  patients[index].name=row.cells[0].children[0].value;
  patients[index].id=row.cells[1].children[0].value;
  patients[index].phone=row.cells[2].children[0].value;
  patients[index].dob=row.cells[3].children[0].value;
  patients[index].address=row.cells[4].children[0].value;
  if(type=="consult"){ patients[index].consultDate=row.cells[5].children[0].value; patients[index].consultStatus=row.cells[6].children[0].value; }
  if(type=="ctsim"){ patients[index].ctsimDate=row.cells[5].children[0].value; patients[index].ctsimStatus=row.cells[6].children[0].value; }
  if(type=="treat"){ patients[index].treatDate=row.cells[5].children[0].value; patients[index].treatStatus=row.cells[6].children[0].value; }
  saveData();
  populateTable(tableID,type);
}

function deleteRow(tableID,type,index){
  if(confirm("Are you sure you want to delete this patient?")){
    patients.splice(index,1);
    saveData();
    populateTable(tableID,type);
  }
}

function filterTable(tableID,inputID){
  let input=document.getElementById(inputID).value.toLowerCase();
  let rows=document.getElementById(tableID).rows;
  for(let i=1;i<rows.length;i++){
    rows[i].style.display=rows[i].innerText.toLowerCase().includes(input)?"":"none";
  }
}
</script>
</body>
</html>
